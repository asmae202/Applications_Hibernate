# Configuration de la connexion MySQL
hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
hibernate.connection.url=jdbc:mysql://localhost:3306/stock?useSSL=false&serverTimezone=UTC
hibernate.connection.username=root
hibernate.connection.password=

# Dialecte MySQL
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Affichage des requĻtes SQL (pour dķboguer)
hibernate.show_sql=true
hibernate.format_sql=true

# Crķation automatique des tables
# update = met Ó jour, create = recrķe Ó chaque fois, validate = vķrifie seulement
hibernate.hbm2ddl.auto=update